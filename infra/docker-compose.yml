version: "3.9"

services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL:-http://localhost:4001}
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL:-}
      - QKMS_URL=${QKMS_URL:-}
      - QKMS_API_KEY=${QKMS_API_KEY:-}
      - HYPERSNAP_URL=${HYPERSNAP_URL:-https://hypersnap.castrater.xyz}
      - INFERENCE_MODE=${INFERENCE_MODE:-mock}
      - STORAGE_BASE_DIR=/app/storage
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../storage:/app/storage
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  worker:
    build:
      context: ..
      dockerfile: workers/jobs/Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL:-}
      - QKMS_URL=${QKMS_URL:-}
      - QKMS_API_KEY=${QKMS_API_KEY:-}
      - INFERENCE_MODE=${INFERENCE_MODE:-mock}
      - INFERENCE_BASE_URL=${INFERENCE_BASE_URL:-http://localhost:11434}
      - INFERENCE_MODEL=${INFERENCE_MODEL:-llama3.2}
      - STORAGE_BASE_DIR=/app/storage
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../storage:/app/storage
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Redis is NOT exposed to the public internet
    # Use 127.0.0.1 binding if you ever need local access for debugging
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 1g

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Postgres is NOT exposed to the public internet
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-castrater}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 4g

  # Optional: Ollama inference server
  # Run with: docker compose --profile inference up
  ollama:
    image: ollama/ollama
    profiles: ["inference"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 12g

volumes:
  redis-data:
  postgres-data:
  ollama-data:
