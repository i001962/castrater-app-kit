version: "3.9"

services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL:-http://localhost:4001}
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:changeme@postgres:5432/castrater}
      - AUTH_PROVIDER=${AUTH_PROVIDER:-passkey}
      - SESSION_PROVIDER=${SESSION_PROVIDER:-cookie}
      - CUSTODY_PROVIDER=${CUSTODY_PROVIDER:-local}
      - LOCAL_CUSTODY_SECRET=${LOCAL_CUSTODY_SECRET:-change-me-local-custody-secret}
      - QUILIBRIUM_QKMS_SERVER=${QUILIBRIUM_QKMS_SERVER:-https://qkms.quilibrium.com}
      - QUILIBRIUM_QNZM_SERVER=${QUILIBRIUM_QNZM_SERVER:-https://qnzm.quilibrium.com}
      - QUILIBRIUM_APP_ID=${QUILIBRIUM_APP_ID:-}
      - QUILIBRIUM_APP_SECRET=${QUILIBRIUM_APP_SECRET:-}
      - STORAGE_BASE_DIR=/app/storage
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:4000}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-localhost}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-castrater-app-kit}
      - WEBAUTHN_ORIGIN=${WEBAUTHN_ORIGIN:-http://localhost:4000}
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME:-castrater_session}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-168}
      - AUTH_INSECURE_COOKIE=${AUTH_INSECURE_COOKIE:-false}
      - AUTH_CHALLENGE_TTL_SECONDS=${AUTH_CHALLENGE_TTL_SECONDS:-300}
    volumes:
      - ../storage:/app/storage
    depends_on:
      - redis
      - postgres
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 1g

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-castrater}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 4g

volumes:
  redis-data:
  postgres-data:
